name: Worker 构建

on:
  push:
    branches: [main, master]
    paths:
      - 'worker/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'worker/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ttml-worker-linux-x64
            binary_path: worker/target/x86_64-unknown-linux-gnu/release/ttml-worker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ttml-worker-windows-x64
            binary_path: worker/target/x86_64-pc-windows-msvc/release/ttml-worker.exe
    defaults:
      run:
        working-directory: ./worker

    steps:
      - uses: actions/checkout@v4

      - name: 配置 Rust 环境
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: 检查格式
        run: cargo fmt --all -- --check

      - name: 构建
        run: cargo build --release --bin ttml-worker --target ${{ matrix.target }}

      - name: 确认产物位置
        run: |
          echo "查找编译产物..."
          find target -name "ttml-worker*" -type f

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

      - name: 测试
        run: cargo test --release --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --release --all-targets --target ${{ matrix.target }} -- -D warnings
