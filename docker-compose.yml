version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ttml-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ttml}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ttml}
      POSTGRES_DB: ${DB_NAME:-ttml_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ttml} -d ${DB_NAME:-ttml_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ttml-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ttml-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ttml-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: ttml-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-meili-master-key}
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  # 注：Go API 与 Rust Worker 默认不在此 compose 中启动镜像，
  # 开发时本地 go run / cargo run；生产构建后取消下方注释即可。
  # api:
  #   build:
  #     context: ./backend
  #   container_name: ttml-api
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     meilisearch:
  #       condition: service_started
  #   ports:
  #     - "8080:8080"
  #
  # worker:
  #   build:
  #     context: ./worker
  #   container_name: ttml-worker
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     meilisearch:
  #       condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  meili_data:
